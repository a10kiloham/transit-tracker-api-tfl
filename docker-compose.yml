services:
  transit-tracker-api:
    build: .
    container_name: transit-tracker-api
    depends_on:
      - transit-tracker-postgres
      - transit-tracker-redis
    env_file:
      - .env
    environment:
      # Uncomment the below line if running through a reverse proxy (e.g., nginx, caddy, traefik)
      # TRUST_PROXY: "true"
      REDIS_URL: "redis://transit-tracker-redis:6379"
      DATABASE_URL: "postgres://postgres:postgres@transit-tracker-postgres:5432/gtfs?sslmode=disable"
      # The below variable controls how frequently GTFS feeds are imported.
      # This example sets it to once daily at midnight, which is enough
      # for most use cases. Adjust as needed.
      FEED_SYNC_SCHEDULE: "0 0 * * *"
      # You can provide your feeds configuration as an environment variable
      # or as a bind mount. See the `volumes:` section below for an example.
    volumes:
      - "./feeds.yaml:/app/feeds.yaml"
    #ports:
    #  - "3000:3000"
    networks:
      - transitnet
      - caddynet

  transit-tracker-postgres:
    image: postgres:17
    container_name: transit-tracker-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gtfs
    volumes:
      - "./postgres:/var/lib/postgresql/data"
    networks:
      - transitnet
  
  transit-tracker-redis:
    container_name: transit-tracker-redis
    image: redis:6
    expose:
      - "6379"
    networks:
      - transitnet

networks:
  transitnet:
    internal: true
  caddynet:
    external: true
